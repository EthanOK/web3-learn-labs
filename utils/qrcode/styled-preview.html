<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>二维码生成器</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        gap: 0.75rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }
      #qr {
        min-width: 200px;
        min-height: 200px;
        padding: 1.25rem;
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      #qr svg {
        display: block;
        max-width: 100%;
        height: auto;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }
      button {
        padding: 0.5rem 1rem;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
      }
      button.secondary {
        background: #334155;
        color: #f8fafc;
      }
      input {
        width: min(92vw, 520px);
        padding: 0.55rem 0.75rem;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        font-size: 0.875rem;
      }
      label {
        font-size: 0.8rem;
        color: #94a3b8;
        align-self: stretch;
        max-width: 520px;
      }
      code {
        font-size: 0.85em;
        background: #1e293b;
        padding: 0.1em 0.35em;
        border-radius: 4px;
      }
      p.hint {
        font-size: 0.85rem;
        color: #94a3b8;
        max-width: 520px;
        margin: 0;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>二维码生成器</h1>
    <p class="hint">
      用地址栏 <code>?data=</code> 传入 URI；中间图来自
      <code>utils/qrcode/logo.svg</code>（保存后<strong>刷新页面</strong>生效）。
    </p>
    <label for="payload">Payload</label>
    <input
      id="payload"
      type="text"
      placeholder="wc:... 或 ethereum:0x... 或 bitcoin:..."
      autocomplete="off"
    />
    <div id="qr"></div>
    <div class="row">
      <button type="button" id="download">下载 PNG</button>
      <button type="button" id="regen" class="secondary">重新生成</button>
    </div>
    <script type="module" src="./styled-preview-client.ts"></script>
  </body>
</html>
